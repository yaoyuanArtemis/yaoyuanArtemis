name: Monthly Commit Stats

on:
  schedule: [{cron: "0 3 * * *"}]
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate commit stats
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python3 scripts/update-commit-stats.py
      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update commit stats [skip ci]"
          git push
