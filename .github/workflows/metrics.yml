name: GitHub Metrics (Academic Style)

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Academic Style Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: yaoyuanArtemis
          template: classic
          config_timezone: Asia/Hong_Kong
          config_display: large
          
          # 基础模块：保持头部、活跃度、基础仓库信息
          base: header, activity, repositories
          
          # --- 优化后的插件配置 ---
          
          # 1. 语言插件：增加过滤项，隐藏前端配置/样式语言，突出核心编程语言
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css, tex, less, sass, scss, dockerfile, makefile, shell
          plugin_languages_limit: 4
          
          # # 2. 修复编码习惯：天数延长到 30 天（保证有足够数据生成图表），去除强制指定的图表类型以防止报错
          # plugin_habits: yes
          # plugin_habits_days: 360
          # plugin_habits_facts: yes
          # plugin_habits_from: 360
          
          # 3. 替换 3D 日历为“代码增删行数统计” (更具研发严谨性)
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
