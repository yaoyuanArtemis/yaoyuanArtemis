name: GitHub Metrics (Rich Academic Style)

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Rich Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: yaoyuanArtemis
          template: classic
          config_timezone: Asia/Hong_Kong
          config_display: large
          
          # 基础模块
          base: header, activity, repositories
          
          # 1. 语言插件 (保留净化过的核心语言)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css, tex, less, sass, scss, dockerfile, makefile, shell
          plugin_languages_limit: 5
          
          # 2. 代码行数统计 (保留)
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base

          # --- 👇 下面是新增的丰富内容模块 👇 ---

          # 3. 核心成就展示：极大地丰富视觉，像游戏勋章一样展示你的开源里程碑
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
          # 4. 仓库话题标签：抓取你名下仓库的 tags (如 React, Python, LLM)，生成技术词云
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12
          
          # 5. 最近具体动态：用列表形式展示你最近敲了什么代码、参与了什么项目，增加简历感
          plugin_activity: yes
          plugin_activity_limit: 4
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr
